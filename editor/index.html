<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MH4U DB Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>MH4U Editor</h1>
      </div>
      <div id="table-groups"></div>
    </aside>

    <div id="resize-handle"></div>

    <main id="main">
      <div id="toolbar">
        <div id="toolbar-left">
          <span id="table-title">Select a table</span>
          <span id="row-count"></span>
        </div>
        <div id="toolbar-right">
          <input type="text" id="search-input" placeholder="Search…" disabled>
          <button id="add-btn" disabled>+ Add Row</button>
          <button id="export-btn">Export SQL</button>
        </div>
      </div>

      <div id="grid-container">
        <div id="grid-placeholder">
          <p>Select a table from the sidebar to begin editing.</p>
        </div>
      </div>

      <div id="pagination" style="display:none">
        <button id="prev-btn">← Prev</button>
        <span id="page-info"></span>
        <button id="next-btn">Next →</button>
        <select id="page-size-select">
          <option value="25">25 / page</option>
          <option value="50" selected>50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
    </main>
  </div>

  <!-- Row Editor Modal -->
  <div id="modal-overlay" style="display:none">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Edit Row</h2>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button id="delete-btn" class="btn-danger">Delete</button>
        <div style="flex:1"></div>
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
