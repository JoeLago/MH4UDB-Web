<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Monster Hunter 4 Ultimate Database — offline companion app">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MH4U DB">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/pwa/apple-touch-icon.png">
  <title>MH4U Database</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p class="loading-text">Loading database…</p>
    </div>
  </div>

  <div id="app-shell">
    <nav id="sidebar"></nav>
    <div id="main-content">
      <header id="page-header">
        <button id="back-btn" class="back-btn" style="display:none" aria-label="Home">&#8962;</button>
        <span id="page-title" class="page-title">MH4U Database</span>
      </header>
      <main id="content"></main>
    </div>
    <nav id="bottom-nav"></nav>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script type="module" src="js/app.js?v=2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
